<p-card class="route-card">
  <ng-template #header>
    <button
      type="button"
      class="card-image-wrapper image-preview-trigger"
      [attr.aria-label]="'Open map image for ' + route.title"
      (click)="openImagePreview(route.image, route.title + ' map', route.title + ' Map')"
    >
      <img [src]="route.image" [alt]="route.title" class="card-hero-image" />
      <span class="image-preview-icon" aria-hidden="true">
        <i class="pi pi-search-plus"></i>
      </span>
      <div class="card-title-overlay">
        <h2 class="route-title">{{ route.title }}</h2>
      </div>
    </button>
  </ng-template>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-icon-wrapper">
        <i class="pi pi-map stat-icon"></i>
      </div>
      <span class="stat-value">{{ route.distance }} km</span>
      <span class="stat-label">Distance</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-icon-wrapper">
        <i class="pi pi-arrow-up stat-icon"></i>
      </div>
      <span class="stat-value">{{ route.ascent }} m</span>
      <span class="stat-label">Ascent</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-icon-wrapper">
        <i class="pi pi-cloud stat-icon"></i>
      </div>
      <span class="stat-value">{{ route.maxAltitude }} m</span>
      <span class="stat-label">Max Altitude</span>
    </div>
  </div>

  <p class="route-description">{{ route.description }}</p>

  <p-panel
    header="Route Details"
    [toggleable]="true"
    [collapsed]="true"
    class="route-detail-panel"
    expandIcon="pi pi-chevron-up"
    collapseIcon="pi pi-chevron-down"
  >
    <div class="detail-content">
      <p class="detail-text">{{ route.detailedDescription }}</p>
      <button
        type="button"
        class="detail-image-wrapper image-preview-trigger"
        [attr.aria-label]="'Open elevation profile for ' + route.title"
        (click)="openImagePreview(route.extraImage, route.title + ' elevation profile', route.title + ' Elevation Profile')"
      >
        <img [src]="route.extraImage" [alt]="route.title + ' detail'" class="detail-image" />
        <span class="image-preview-icon image-preview-icon--detail" aria-hidden="true">
          <i class="pi pi-search-plus"></i>
        </span>
      </button>
      @if (route.gpxFile) {
        <a [href]="route.gpxFile" [download]="route.title + '.gpx'" class="gpx-download">
          <div class="gpx-icon-wrapper">
            <i class="pi pi-download"></i>
          </div>
          <div class="gpx-text">
            <span class="gpx-label">Download GPX</span>
            <span class="gpx-sub">{{ route.title }}</span>
          </div>
        </a>
      }
    </div>
  </p-panel>
</p-card>

<p-dialog
  [(visible)]="previewVisible"
  [modal]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  [header]="previewTitle"
  styleClass="image-preview-dialog"
  appendTo="body"
>
  <div class="image-preview-content">
    <img [src]="previewImage" [alt]="previewAlt" class="image-preview-full" />
  </div>
</p-dialog>
